{% extends "base.html" %}
{% block body %}
<div class="login-page">
    <div class="login-card">
        <div style="text-align:center; margin-bottom:24px;">
            <div style="width:60px;height:60px;background:linear-gradient(135deg,#7c5cfc,#00d4ff);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;">🎬</div>
            <h1 class="login-title">MediaBot</h1>
            <p class="login-sub">Admin panelga kirish</p>
        </div>

        {% if error %}
        <div class="flash-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Foydalanuvchi nomi</label>
                <input type="text" name="username" class="form-input" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label class="form-label">Parol</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Kirish →</button>
        </form>
    </div>
</div>
{% endblock %}
