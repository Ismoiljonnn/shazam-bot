services:
  - type: web
    name: mediabot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: DOWNLOAD_TIMEOUT
        value: "300"
      - key: PORT
        value: "10000"
    healthCheckPath: /admin/login
